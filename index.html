<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ⲁ Ⲙ Ⲟ ꓤ Ⲟ — Never Not Playing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="fractalCanvas"></canvas>

    <div class="centerTitle" aria-hidden="true">Ⲁ Ⲙ Ⲟ ꓤ Ⲟ</div>

    <main class="ui" aria-label="Amoro">
        <header class="hero">
            <h1 class="glitch" data-text="Ⲁ Ⲙ Ⲟ ꓤ Ⲟ">Ⲁ Ⲙ Ⲟ ꓤ Ⲟ</h1>
            <p class="subhead subheadGlitch" data-text="Never Not Playing">Never Not Playing</p>
        </header>

        <div class="scrollSpacer" aria-hidden="true"></div>

        <nav class="links" aria-label="Links">
            <a href="#sets">Sets</a>
            <a href="#contact">@Contact</a>
        </nav>

        <section class="section" id="sets" aria-label="Sets">
            <h2 class="sectionTitle">All sets</h2>
            <div id="mixcloudSets" class="setsGrid" aria-live="polite"></div>
        </section>

        <section class="section" id="contact" aria-label="Contact">
            <div id="contactTitleMount"></div>
            <p class="contactLine isHidden">
                <a class="contactLink" href="mailto:GlueRecords@revamail.com">GlueRecords@revamail.com</a>
            </p>
        </section>
    </main>

    <a id="contactBubble" class="contactBubble" href="#" aria-label="Contact">@Contact</a>

    <div id="nowPlaying" class="nowPlaying" aria-label="Now playing">
        <div class="nowPlayingBar">
            <p id="nowPlayingTitle" class="nowPlayingTitle">AMORO - TRICKS OR TREAT?</p>
            <button id="nowPlayingToggle" class="nowPlayingToggle" type="button" aria-label="Pause playback">Pause</button>
        </div>
        <iframe
            id="mixcloudPlayer"
            class="nowPlayingFrame"
            title="AMORO - TRICKS OR TREAT? player"
            allow="autoplay"
            tabindex="-1"
            src="https://www.mixcloud.com/widget/iframe/?feed=%2Famooro%2Famoro-tricks-or-treat%2F&hide_cover=1&hide_artwork=1&mini=1&autoplay=1&light=1"
        ></iframe>
    </div>
    
    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>
    <script src="fractal.js"></script>
    <script src="site.js"></script>
</body>
</html>
